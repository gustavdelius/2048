<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <link href="https://fonts.googleapis.com/css?family=Clear+Sans:400,700,800" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1 class="title">2048</h1>
            <div class="scores-container">
                <div class="score-container">0</div>
                <!-- <div class="best-container">0</div> -->
            </div>
        </div>

        <div class="above-game">
            <p class="game-intro">Join the numbers and get to the <strong>2048 tile!</strong></p>
            <a class="restart-button" id="restart-btn">New Game</a>
        </div>

        <div class="ai-controls" style="margin-top: 20px; display: flex; align-items: center; justify-content: space-between; background: #bbada0; padding: 15px; border-radius: 3px; color: white;">
            <div>
                <button id="start-ai-btn" style="background: #8f7a66; color: white; border: none; padding: 10px 20px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-right: 10px;">Start AI</button>
                <button id="stop-ai-btn" disabled style="background: #ccc; color: white; border: none; padding: 10px 20px; border-radius: 3px; cursor: not-allowed; font-weight: bold;">Stop AI</button>
            </div>
            <div class="speed-control" style="display: flex; align-items: center;">
                <label for="ai-speed" style="margin-right: 10px; font-weight: bold;">Speed: <span id="speed-val">500</span>ms</label>
                <input type="range" id="ai-speed" min="10" max="1000" step="10" value="500">
            </div>
        </div>

        <div class="game-container">
            <div class="game-message" id="game-message">
                <p></p>
                <div class="lower">
                    <a class="retry-button" id="retry-btn">Try again</a>
                </div>
            </div>

            <div class="grid-container" id="grid">
                <!-- 3x3 Grid Cells generated by JS or static -->
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
            </div>
            
            <div class="tile-container" id="tile-container">
                <!-- Tiles will be added here dynamically via JavaScript -->
            </div>
        </div>
        
        <div class="controls">
             <p>Use your <strong>arrow keys</strong> or <strong>WASD</strong> to move the tiles. The grid is <strong>3x3</strong>!</p>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
